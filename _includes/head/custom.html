<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page.title | default: site.title }}">
<meta name="twitter:description" content="{{ page.description | default: page.excerpt | default: site.description | strip_html | truncate: 200 }}">
<meta name="twitter:image" content="{{ page.header.og_image | default: site.og_image | absolute_url }}">

<!-- capitalize toggle -->
<script src="/assets/js/capitalize-toggle.js" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    CapitalizeToggle.init([
      {% for noun in site.capitalize.proper_nouns %}
      { name: {{ noun.name | jsonify }}, capitalized: {{ noun.capitalized | jsonify }} }{% unless forloop.last %},{% endunless %}
      {% endfor %}
    ]);
  });
</script>

{% if page.custom_cap_toggle == "linkedin" %}
{% include cap-toggles/linkedin.html %}
{% endif %}
