<style>
  body.linkedin-caps-on .page__content,
  body.linkedin-caps-on .page__title,
  body.linkedin-caps-on #page-title,
  body.linkedin-caps-on .site-title,
  body.linkedin-caps-on .masthead__menu-item,
  body.linkedin-caps-on .archive__item-title {
    text-transform: uppercase;
  }

  @media print {
    .capitalize-toggle {
      display: none !important;
    }
  }
</style>

<script>
  (function () {
    var SESSION_KEY = 'linkedin-caps-pref';
    var TIP_OFF = 'lol LINKEDIN YEAH';
    var TIP_ON = 'lol';

    document.addEventListener('DOMContentLoaded', function () {
      // wait a tick so global capitalize-toggle.js finishes its init + inline injection
      setTimeout(function () {
        var buttons = document.querySelectorAll('.capitalize-toggle');
        if (!buttons.length) return;

        // strip global listeners by clone-replace
        var fresh = [];
        buttons.forEach(function (btn) {
          var clone = btn.cloneNode(false);
          btn.parentNode.replaceChild(clone, btn);
          fresh.push(clone);
        });

        function render() {
          var on = document.body.classList.contains('linkedin-caps-on');
          fresh.forEach(function (btn) {
            btn.textContent = 'Aa';
            btn.setAttribute('data-tooltip', on ? TIP_ON : TIP_OFF);
            btn.setAttribute('aria-label', on ? TIP_ON : TIP_OFF);
          });
        }

        if (sessionStorage.getItem(SESSION_KEY) === 'on') {
          document.body.classList.add('linkedin-caps-on');
        }
        render();

        fresh.forEach(function (btn) {
          btn.addEventListener('click', function () {
            var nowOn = !document.body.classList.contains('linkedin-caps-on');
            document.body.classList.toggle('linkedin-caps-on', nowOn);
            if (nowOn) {
              sessionStorage.setItem(SESSION_KEY, 'on');
            } else {
              sessionStorage.removeItem(SESSION_KEY);
            }
            render();
          });
        });
      }, 0);
    });
  })();
</script>
